name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
        working-directory: ./
      - name: Build Next.js
        run: npm run build
        working-directory: ./sky-pass
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: ./sky-pass
